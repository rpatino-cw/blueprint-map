<svg xmlns="http://www.w3.org/2000/svg" width="700" height="120" viewBox="0 0 700 120">
  <defs>
    <linearGradient id="fbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d2240"/>
    </linearGradient>
  </defs>
  <rect width="700" height="120" fill="url(#fbg)" rx="8"/>
  <!-- Step 1: CSV -->
  <rect x="20" y="30" width="100" height="60" rx="6" fill="#0d2b3d" stroke="#4a9ec4" stroke-width="1.5"/>
  <text x="70" y="55" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="600" fill="#c4dff6">CSV</text>
  <text x="70" y="72" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#7ec8e3" opacity="0.7">overhead file</text>
  <!-- Arrow 1 -->
  <polygon points="130,60 145,54 145,66" fill="#3d7cc9" opacity="0.6"/>
  <line x1="145" y1="60" x2="155" y2="60" stroke="#3d7cc9" stroke-width="1.5" opacity="0.6"/>
  <!-- Step 2: Grid -->
  <rect x="160" y="30" width="100" height="60" rx="6" fill="#0d2b3d" stroke="#4a9ec4" stroke-width="1.5"/>
  <text x="210" y="55" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="600" fill="#c4dff6">2D Grid</text>
  <text x="210" y="72" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#7ec8e3" opacity="0.7">string array</text>
  <!-- Arrow 2 -->
  <polygon points="270,60 285,54 285,66" fill="#3d7cc9" opacity="0.6"/>
  <line x1="285" y1="60" x2="295" y2="60" stroke="#3d7cc9" stroke-width="1.5" opacity="0.6"/>
  <!-- Step 3: Parser (highlighted) -->
  <rect x="300" y="25" width="120" height="70" rx="6" fill="#0d2b3d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="360" y="50" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="700" fill="#7ec8e3">6-Pass Parser</text>
  <text x="360" y="66" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#c4dff6" opacity="0.6">classify · detect</text>
  <text x="360" y="78" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="8" fill="#c4dff6" opacity="0.6">group · assign</text>
  <!-- Arrow 3 -->
  <polygon points="430,60 445,54 445,66" fill="#3d7cc9" opacity="0.6"/>
  <line x1="445" y1="60" x2="455" y2="60" stroke="#3d7cc9" stroke-width="1.5" opacity="0.6"/>
  <!-- Step 4: Tree -->
  <rect x="460" y="30" width="100" height="60" rx="6" fill="#0d2b3d" stroke="#4a9ec4" stroke-width="1.5"/>
  <text x="510" y="55" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="600" fill="#c4dff6">Hierarchy</text>
  <text x="510" y="72" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#7ec8e3" opacity="0.7">hall/grid/pod</text>
  <!-- Arrow 4 -->
  <polygon points="570,60 585,54 585,66" fill="#3d7cc9" opacity="0.6"/>
  <line x1="585" y1="60" x2="595" y2="60" stroke="#3d7cc9" stroke-width="1.5" opacity="0.6"/>
  <!-- Step 5: SVG -->
  <rect x="600" y="30" width="80" height="60" rx="6" fill="#0d3324" stroke="#4ac49a" stroke-width="1.5"/>
  <text x="640" y="55" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="600" fill="#c4dff6">SVG</text>
  <text x="640" y="72" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#4ac49a" opacity="0.7">visual map</text>
</svg>
