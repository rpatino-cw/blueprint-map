name: Tests
on:
  push:
    branches: [main]
    paths: ['js/**', 'test/**']
  pull_request:
    paths: ['js/**', 'test/**']

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm test
