<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Source+Sans+3:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script>window.BP_VERSION = '2026.03.30a';</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js" integrity="sha512-dfX5uYVXzyU8+KHqj8bkHKm0lMMTnFGnbW5DkFj+mOmOzjPYLOaHDYPv5irg1GdUY0mjBXaonSoA9Jw8SyuHA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>
<body>

<div class="app">
  <header class="bar">
    <div class="bar-left">
      <button class="bar-btn" id="btn-panel" title="Toggle panel">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M2 4.5h11M2 7.5h11M2 10.5h11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      </button>
      <span class="bar-title">Blueprint Map</span>
    </div>
    <div class="bar-right">
      <select class="hall-select" id="hall-select" style="display:none">
        <option value="__all">All halls</option>
      </select>
      <span class="bar-sep" id="hall-sep" style="display:none"></span>
      <button class="bar-btn active" id="btn-grid-view">Grid</button>
      <button class="bar-btn" id="btn-struct-view">Structured</button>
      <span class="bar-sep"></span>
      <button class="bar-btn" id="btn-refresh" title="Refresh live data">&#8635;</button>
      <span class="bar-sep"></span>
      <button class="bar-btn" id="btn-export-svg" disabled>SVG</button>
      <button class="bar-btn" id="btn-export-png" disabled>PNG</button>
    </div>
  </header>

  <aside class="panel" id="panel">
    <div class="p-section">
      <div class="p-label">Source</div>
      <div class="source-tabs">
        <button class="source-tab active" data-source="csv">CSV</button>
        <button class="source-tab" data-source="sheets">Sheet</button>
      </div>
      <div id="source-csv">
        <div class="drop-zone" id="drop-zone">
          <span>Drop .csv or click to browse</span>
          <input type="file" accept=".csv,.tsv,.txt" id="file-input">
        </div>
      </div>
      <div id="source-sheets" style="display:none">
        <select class="input" id="sheet-site">
          <option value="1dtuaNuDuLPGzqkUb6pBOBM-meeoEioGata3xGkq-zgI">EVI01 — Elk Grove (US-CENTRAL-07A)</option>
          <option value="1bxVq9THKhii4y-fUGuYEuO6vy9u273Dbfu4unqD9kTw">Site 2</option>
        </select>
        <input class="input" id="sheet-url" type="text" placeholder="Tab name (default: OVERHEAD)" style="margin-top:6px">
        <p class="hint">Pulls live via Apps Script (CW login required)</p>
        <button class="btn" id="btn-fetch-sheet">Load Live</button>
      </div>
    </div>

    <div class="p-section">
      <div class="p-label">AI Analysis</div>
      <div class="ai-section">
        <label class="ai-toggle"><input type="checkbox" id="ai-enabled" checked> Detect layout</label>
        <div class="ai-key-row">
          <input type="password" id="ai-key" placeholder="API key">
          <button class="btn-sm" id="btn-save-key">Save</button>
        </div>
        <div class="ai-status" id="ai-status"></div>
      </div>
    </div>

    <div class="p-section">
      <div class="p-label">Search</div>
      <div class="search-bar">
        <input id="search-input" type="text" placeholder="Rack, type, grid...">
        <button id="btn-search">Go</button>
      </div>
    </div>

    <div class="p-section" id="parse-section" style="display:none">
      <div class="p-label">Structure</div>
      <div id="parse-tree"></div>
    </div>

    <div class="p-section" id="legend-section" style="display:none">
      <div class="p-label">Types</div>
      <div class="legend-list" id="legend"></div>
    </div>

    <div class="p-section">
      <div class="p-label">Detail</div>
      <div id="detail-content"><span class="detail-empty">Click a cell on the map</span></div>
    </div>
  </aside>

  <main class="canvas" id="map-container">
    <div class="map-canvas" id="map-canvas">
      <div class="empty-state" id="empty-state">
        <span class="empty-text">Drop a CSV file anywhere</span>
      </div>
    </div>
    <div class="title-block" id="title-block" style="display:none">
      <span id="tb-title"></span>
      <span class="tb-sep">/</span>
      <span><span id="tb-racks"></span> racks</span>
      <span class="tb-sep">/</span>
      <span id="tb-halls"></span>
      <span class="tb-sep">/</span>
      <span id="tb-date"></span>
    </div>
    <div class="zoom-controls">
      <button class="zoom-btn" id="zoom-in">+</button>
      <span class="zoom-level" id="zoom-level">100%</span>
      <button class="zoom-btn" id="zoom-out">&minus;</button>
      <button class="zoom-btn zoom-fit" id="zoom-fit">Fit</button>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  var v = window.BP_VERSION || Date.now();
  var scripts = ['js/type-library.js','js/parser.js','js/renderer.js','js/ai.js','js/app.js'];
  var i = 0;
  function next() {
    if (i >= scripts.length) return;
    var s = document.createElement('script');
    s.src = scripts[i++] + '?v=' + v;
    s.onload = next;
    document.body.appendChild(s);
  }
  next();
})();
</script>
</body>
</html>
